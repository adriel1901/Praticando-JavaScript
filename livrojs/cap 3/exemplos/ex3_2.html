<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/estilos.css">
    <title>Exemplo 3.2</title>
</head>

<body>
    <img src="../img/ex3_2.png" alt="Exemplo 3.2">
    <h1>Programa Cálculo de peso Ideal</h1>
    <p>Nome:
        <input type="text" id="nome">
    </p>
    <p>Sexo:
        <input type="radio" name="sexo" id="masc" value="masculino"> Masculino
        <input type="radio" name="sexo" id="fem" value="feminino"> Feminino
    </p>
    <p>Altura:
        <input type="text" id="altura">
    </p>
    <p>
        <input type="button" id="calcular" value="Calcular Peso Ideal">
        <input type="button" id="limpar" value="Limpar Campos">
    </p>
    <p id="resposta"></p>
    <script src="../js/ex3_2.js"></script>
</body>
